<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>wasadraw geometry example</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        background: #0f1117;
      }

      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>

    <script type="module">
      import {
        createCanvasApp,
        createEffectManager,
        Palette,
        centerOf,
        circle,
        contains,
        moved,
        rect,
        vec2,
      } from "../dist/index.js";

      const effects = createEffectManager();
      const button = rect(40, 40, 220, 72);
      const baseCircle = circle(vec2(200, 190), 34);

      createCanvasApp("#canvas", (context) => {
        const { draw, input, deltaTime, time } = context;

        draw.clear("#0f1117");

        const hovered = contains(button, input.mouse.position);
        const center = centerOf(button);
        const movingCircle = moved(baseCircle, {
          x: Math.sin(time * 1.6) * 150,
          y: 0,
        });
        const circleHovered = contains(movingCircle, input.mouse.position);

        draw.roundRect(button, 16, {
          fill: hovered ? "#263246" : "#171d2a",
          stroke: "#ffffff33",
          width: 1,
        });

        draw.text("Hover Button", center, {
          size: 20,
          fill: Palette.White,
          align: "center",
          baseline: "middle",
          font: "system-ui, sans-serif",
          alpha: hovered ? 1 : 0.35,
        });

        draw.emoji("✨", { x: center.x + 80, y: center.y }, {
          size: 24,
          alpha: hovered ? 1 : 0.35,
        });

        draw.line(baseCircle.center, movingCircle.center, {
          stroke: "#ffffff22",
          width: 2,
          lineCap: "round",
        });

        draw.circle(baseCircle.center, baseCircle.r, {
          stroke: "#ffffff33",
          width: 2,
          alpha: 0.8,
        });

        draw.circle(movingCircle.center, movingCircle.r, {
          fill: circleHovered ? Palette.Orange : Palette.Skyblue,
          stroke: circleHovered ? Palette.White : "#ffffff55",
          width: 2,
        });

        draw.text("circle() + moved()", {
          x: baseCircle.center.x,
          y: baseCircle.center.y + 68,
        }, {
          size: 16,
          fill: "#ffffffaa",
          align: "center",
          baseline: "middle",
          font: "system-ui, sans-serif",
        });

        if (circleHovered && input.mouse.left.down) {
          const pos = { ...input.mouse.position };

          effects.add((t, { draw }) => {
            draw.circle(pos, t * 96, {
              stroke: Palette.Orange,
              width: 2,
              alpha: Math.max(0, 1 - t),
            });

            return t < 1.0;
          });
        }

        if (hovered && input.mouse.left.down) {
          const pos = { ...input.mouse.position };

          effects.add((t, { draw }) => {
            draw.circle(pos, t * 120, {
              stroke: Palette.White,
              width: 2,
              alpha: Math.max(0, 1 - t),
            });

            return t < 1.0;
          });
        }

        effects.update(deltaTime, context);
      }, {
        autoStart: true,
        maxDpr: 2,
      });
    </script>
  </body>
</html>
