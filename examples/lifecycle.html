<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>wasadraw lifecycle example</title>
    <style>
      html,
      body {
        width: 100%;
        min-height: 100%;
        margin: 0;
      }

      body {
        overflow: auto;
        background: #0f1117;
        color: #ffffffcc;
        font-family: system-ui, sans-serif;
      }

      main {
        padding: 24px;
      }

      h1 {
        margin: 0 0 14px;
        color: #fff;
        font-size: 22px;
        font-weight: 700;
      }

      canvas {
        display: block;
        width: 900px;
        height: 520px;
      }

      .controls {
        display: flex;
        gap: 8px;
        margin-top: 14px;
      }

      button {
        border: 1px solid #ffffff33;
        border-radius: 6px;
        padding: 8px 14px;
        background: #171d2a;
        color: #fff;
        font: inherit;
        cursor: pointer;
      }

      button:hover {
        background: #20283a;
      }

      p {
        max-width: 900px;
        margin: 12px 0 0;
        color: #ffffff99;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>lifecycle example</h1>
      <canvas id="canvas"></canvas>

      <div class="controls">
        <button id="stop" type="button">stop()</button>
        <button id="start" type="button">start()</button>
      </div>

      <p>
        別のタブへ移動して戻ると、hidden の間は frame count が進みません。stop() 後は、タブへ戻っても自動では再開しません。
      </p>
    </main>

    <script type="module">
      import {
        createCanvasApp,
        Palette,
        vec2,
        rect,
        circle,
        line,
        rgba,
      } from "../dist/index.js";

      const font = "system-ui, sans-serif";
      let angle = 0;
      let maxDelta = 0;

      // pauseWhenHidden は opt-in です。既定値は false のままです。
      const app = createCanvasApp("#canvas", ({ draw, frame, time, deltaTime, size }) => {
        maxDelta = Math.max(maxDelta, deltaTime);
        angle += deltaTime * 1.5;

        draw.clear("#0f1117");

        draw.text("pauseWhenHidden: true", vec2(40, 46), {
          size: 24,
          fill: Palette.White,
          font,
        });

        draw.text("frame", vec2(64, 110), {
          size: 16,
          fill: "#ffffff99",
          font,
        });
        draw.text(String(frame), vec2(64, 150), {
          size: 36,
          fill: Palette.White,
          font,
        });

        draw.text("time", vec2(260, 110), {
          size: 16,
          fill: "#ffffff99",
          font,
        });
        draw.text(time.toFixed(2), vec2(260, 150), {
          size: 36,
          fill: Palette.White,
          font,
        });

        draw.text("deltaTime ms", vec2(456, 110), {
          size: 16,
          fill: "#ffffff99",
          font,
        });
        draw.text((deltaTime * 1000).toFixed(1), vec2(456, 150), {
          size: 36,
          fill: Palette.White,
          font,
        });

        draw.text("max deltaTime ms", vec2(662, 110), {
          size: 16,
          fill: "#ffffff99",
          font,
        });
        draw.text((maxDelta * 1000).toFixed(1), vec2(662, 150), {
          size: 36,
          fill: Palette.White,
          font,
        });

        draw.text("deltaTime で進む状態", vec2(248, 256), {
          size: 16,
          fill: "#ffffffcc",
          align: "center",
          font,
        });

        draw.shape(circle(vec2(248, 360), 92), {
          stroke: rgba(255, 255, 255, 0.18),
          width: 2,
        });

        // hidden 中は requestAnimationFrame を止めるので、deltaTime で積んだ角度は飛びません。
        draw.withTransform({
          translate: vec2(248, 360),
          rotate: angle,
        }, () => {
          draw.shape(line(vec2(0, 0), vec2(88, 0)), {
            stroke: "#ffffff88",
            width: 3,
            lineCap: "round",
          });
          draw.roundRect(rect(-42, -24, 84, 48), 8, {
            fill: "#263246",
            stroke: Palette.Skyblue,
            width: 2,
          });
          draw.circle(vec2(88, 0), 14, {
            fill: Palette.Orange,
            stroke: Palette.White,
            width: 2,
          });
        });

        draw.text("time で読む時計", vec2(648, 256), {
          size: 16,
          fill: "#ffffffcc",
          align: "center",
          font,
        });

        draw.shape(circle(vec2(648, 360), 92), {
          stroke: rgba(255, 255, 255, 0.18),
          width: 2,
        });

        // time は wall-clock なので、pause をまたぐと進みます。deltaTime で積んだ状態とは違います。
        const clockAngle = time;
        draw.withTransform({
          translate: vec2(648, 360),
          rotate: clockAngle,
        }, () => {
          draw.shape(line(vec2(0, 0), vec2(82, 0)), {
            stroke: Palette.Gold,
            width: 3,
            lineCap: "round",
          });
          draw.circle(vec2(82, 0), 12, {
            fill: Palette.Gold,
            stroke: Palette.White,
            width: 2,
          });
        });

        draw.text("stop() 中に hidden になっても、visible で勝手には再開しません。", vec2(size.center.x, 490), {
          size: 14,
          fill: "#ffffff80",
          align: "center",
          font,
        });
      }, {
        autoStart: true,
        maxDpr: 2,
        pauseWhenHidden: true,
      });

      document.querySelector("#stop").onclick = () => app.stop();
      document.querySelector("#start").onclick = () => app.start();

      // destroy() は visibilitychange listener も外します。
    </script>
  </body>
</html>
