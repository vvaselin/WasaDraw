<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>canvaskit basic example</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        background: #0f1117;
      }

      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>

    <script type="module">
      import {
        createCanvasApp,
        createEffectManager,
        Palette,
        deg,
        lerp,
        pingPong,
        easeOutCubic,
      } from "../dist/index.js";

      const effects = createEffectManager();

      const app = createCanvasApp("#canvas", (context) => {
        const { draw, time, deltaTime, size, input } = context;

        draw.clear("#0f1117");

        const mouse = input.mouse;

        if (mouse.left.down) {
          const pos = { ...mouse.position };

          effects.add((t, { draw }) => {
            const progress = t / 0.8;

            if (progress >= 1) {
              return false;
            }

            const eased = easeOutCubic(progress);

            draw.circle(pos, eased * 96, {
              stroke: Palette.White,
              width: 2,
              alpha: 1 - progress,
            });

            return true;
          });
        }

        const t = pingPong(time * 0.5, 1);
        const x = lerp(80, Math.max(80, size.width - 80), t);
        const y = size.center.y;

        draw.line(
          { x: 80, y },
          { x, y },
          {
            stroke: "#ffffff33",
            width: 2,
            lineCap: "round",
          },
        );

        draw.rect(
          { x: 32, y: 32, w: 180, h: 72 },
          {
            fill: "#1d2433",
            stroke: "#ffffff22",
            width: 1,
          },
        );

        draw.roundRect(
          { x: size.width - 184, y: 32, w: 152, h: 72 },
          14,
          {
            fill: "#18251f",
            stroke: Palette.Seagreen,
            width: 2,
          },
        );

        draw.circle({ x, y }, 32, {
          fill: Palette.Skyblue,
        });

        draw.text("CanvasKit basic", { x: 48, y: 76 }, {
          size: 20,
          fill: Palette.White,
          font: "system-ui, sans-serif",
        });

        draw.text(
          `mouse: ${mouse.position.x.toFixed(0)}, ${mouse.position.y.toFixed(0)}`,
          { x: 48, y: size.height - 36 },
          {
            size: 16,
            fill: "#ffffffaa",
            font: "system-ui, sans-serif",
          },
        );

        draw.emoji("🌙", { x, y: y - 72 }, {
          size: 64,
          rotation: deg(Math.sin(time) * 10),
        });

        draw.emoji("✨", { x: size.center.x, y: 92 }, {
          size: 42,
          rotation: time * 0.6,
          scale: 1 + Math.sin(time * 2) * 0.08,
        });

        effects.update(deltaTime, context);
      }, {
        autoStart: true,
        maxDpr: 2,
      });

      window.addEventListener("pagehide", () => app.destroy(), { once: true });
    </script>
  </body>
</html>
