<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>wasadraw animation example</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        overflow: auto;
        background: #0f1117;
      }

      canvas {
        display: block;
        width: 1200px;
        height: 760px;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>

    <script type="module">
      import {
        createCanvasApp,
        createAnimation,
        Palette,
        vec2,
        rect,
        circle,
        lerp,
        linear,
        easeInOutSine,
        easeInOutCubic,
        easeOutQuad,
        easeOutBack,
        easeOutElastic,
        easeOutBounce,
      } from "../dist/index.js";

      const font = "system-ui, sans-serif";

      // createAnimation(): 名前付きトラックにキーフレーム { time, value, ease? } を並べます。
      // ease は「直前のキーフレームからその区間へ」適用され、省略時は線形です。
      // loop を指定すると time が周期で折り返され、createCanvasApp の time をそのまま渡せます。
      const ball = createAnimation({
        x: [
          { time: 0, value: 160 },
          { time: 2, value: 1040, ease: easeInOutCubic },
          { time: 4, value: 160, ease: easeInOutCubic },
        ],
        y: [
          { time: 0, value: 170 },
          { time: 1, value: 330, ease: easeOutBounce },
          { time: 2, value: 170, ease: easeOutQuad },
          { time: 3, value: 330, ease: easeOutBounce },
          { time: 4, value: 170, ease: easeOutQuad },
        ],
        scale: [
          { time: 0, value: 1 },
          { time: 2, value: 1.6, ease: easeInOutSine },
          { time: 4, value: 1, ease: easeInOutSine },
        ],
        alpha: [
          { time: 0, value: 0.45 },
          { time: 2, value: 1, ease: easeInOutSine },
          { time: 4, value: 0.45, ease: easeInOutSine },
        ],
      }, {
        loop: 4,
      });

      // 単一トラックだけ読みたいときは anim.value(name, time) を使います。
      const spin = createAnimation({
        rotate: [
          { time: 0, value: 0 },
          { time: 4, value: Math.PI * 2, ease: easeInOutCubic },
        ],
      }, {
        loop: 4,
      });

      // イージング比較用: 同じキーフレームで ease だけを変えた Animation を並べます。
      const easingRows = [
        ["linear", linear],
        ["easeInOutSine", easeInOutSine],
        ["easeInOutCubic", easeInOutCubic],
        ["easeOutBack", easeOutBack],
        ["easeOutElastic", easeOutElastic],
        ["easeOutBounce", easeOutBounce],
      ].map(([name, ease]) => ({
        name,
        anim: createAnimation({
          t: [
            { time: 0, value: 0 },
            { time: 1.6, value: 1, ease },
            { time: 3.2, value: 0, ease },
          ],
        }, {
          loop: 3.2,
        }),
      }));

      createCanvasApp("#canvas", ({ draw, time, size }) => {
        draw.clear("#0f1117");

        draw.text("createAnimation(): keyframe tracks + easing", vec2(40, 46), {
          size: 24,
          fill: Palette.White,
          font,
        });

        draw.text("createCanvasApp の time をそのまま渡すのが標準パターンです。loop 指定で周期的に折り返します。", vec2(80, 80), {
          size: 15,
          fill: "#ffffff99",
          font,
        });

        // anim.at(time) は全トラックをまとめて評価します。
        const v = ball.at(time);

        draw.line(vec2(120, 330), vec2(1080, 330), {
          stroke: "#ffffff22",
          width: 2,
          dash: [4, 8],
        });

        draw.circle(vec2(v.x, v.y), 26 * v.scale, {
          fill: Palette.Skyblue,
          alpha: v.alpha,
        });

        draw.text(
          "x / y / scale / alpha の4トラック。duration: " + ball.duration + "s",
          vec2(80, 396),
          {
            size: 14,
            fill: "#ffffff88",
            font,
          },
        );

        // anim.value(name, time): 単一トラックの値を withTransform の rotate に使う例です。
        draw.withTransform({
          translate: vec2(1120, 250),
          rotate: spin.value("rotate", time),
        }, () => {
          draw.rect(rect(-30, -30, 60, 60), {
            fill: Palette.Orange,
            alpha: 0.9,
          });
        });

        // イージング比較: 同じ区間を ease 違いで往復させます。
        draw.text("easing 比較（同じキーフレーム、ease だけ変更）", vec2(80, 452), {
          size: 15,
          fill: "#ffffffcc",
          font,
        });

        const laneLeft = 300;
        const laneRight = 1060;

        easingRows.forEach(({ name, anim }, index) => {
          const y = 500 + index * 42;
          const t = anim.value("t", time);

          draw.text(name, vec2(90, y + 5), {
            size: 14,
            fill: "#ffffff99",
            font,
          });

          draw.line(vec2(laneLeft, y), vec2(laneRight, y), {
            stroke: "#ffffff22",
            width: 2,
          });

          draw.shape(circle(vec2(lerp(laneLeft, laneRight, t), y), 12), {
            fill: "#50fa7b",
          });
        });

        draw.text("ease は easing.ts の30種（Sine / Quad / Cubic / Back / Elastic / Bounce など）から選べます。", vec2(size.center.x, 736), {
          size: 14,
          fill: "#ffffff80",
          align: "center",
          font,
        });
      }, {
        autoStart: true,
        maxDpr: 2,
      });
    </script>
  </body>
</html>
