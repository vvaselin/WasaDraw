<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>canvaskit shapes example</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        background: #0f1117;
      }

      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>

    <script type="module">
      import {
        createCanvasApp,
        Palette,
      } from "../dist/index.js";

      createCanvasApp("#canvas", ({ draw, time, size }) => {
        draw.clear("#0f1117");

        draw.text("v0.2 shapes", { x: 40, y: 44 }, {
          size: 24,
          fill: Palette.White,
          font: "system-ui, sans-serif",
        });

        draw.ellipse({ x: 160, y: 120 }, 80, 40, {
          fill: "#7aa2ff",
        });

        draw.triangle(
          { x: 320, y: 80 },
          { x: 260, y: 180 },
          { x: 380, y: 180 },
          {
            fill: "#ffb86c",
          },
        );

        draw.polygon([
          { x: 500, y: 80 },
          { x: 560, y: 120 },
          { x: 540, y: 190 },
          { x: 460, y: 190 },
          { x: 440, y: 120 },
        ], {
          fill: "#50fa7b",
          stroke: "#ffffff66",
          width: 2,
        });

        draw.polyline([
          { x: 80, y: 280 },
          { x: 160, y: 240 },
          { x: 240, y: 300 },
          { x: 320, y: 260 },
          { x: 400, y: 300 },
        ], {
          stroke: "#ffffff99",
          width: 3,
          dash: [8, 6],
          lineCap: "round",
          lineJoin: "round",
        });

        draw.arc({ x: 540, y: 280 }, 60, 0, Math.PI * 1.5, {
          stroke: "#ff79c6",
          width: 4,
          lineCap: "round",
        });

        const orbitX = size.center.x + Math.cos(time) * 80;
        const orbitY = 420 + Math.sin(time) * 32;

        draw.line({ x: size.center.x - 120, y: 420 }, { x: size.center.x + 120, y: 420 }, {
          stroke: "#ffffff33",
          width: 2,
          dash: [4, 8],
        });

        draw.circle({ x: orbitX, y: orbitY }, 18, {
          fill: Palette.Orange,
          stroke: Palette.White,
          width: 2,
        });
      }, {
        autoStart: true,
        maxDpr: 2,
      });
    </script>
  </body>
</html>
