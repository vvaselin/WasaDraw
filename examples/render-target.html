<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>wasadraw render target example</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        overflow: auto;
        background: #0f1117;
      }

      canvas {
        display: block;
        width: 1200px;
        height: 760px;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>

    <script type="module">
      import {
        createCanvasApp,
        createEffectManager,
        createRenderTarget,
        Palette,
        vec2,
        rect,
        circle,
        line,
        deg,
        rgba,
        hsl,
        hsla,
        easeOutCubic,
      } from "../dist/index.js";

      const font = "system-ui, sans-serif";
      const effects = createEffectManager();
      const stamp = createRenderTarget(160, 160, { maxDpr: 2 });
      const tile = createRenderTarget(96, 96, { maxDpr: 2 });
      let stampHue = 205;

      const renderStamp = () => {
        // 一度だけ描いて、毎フレームでは draw.image で再描画するだけです。キャッシュ用途の小さな例です。
        stamp.clear();
        stamp.render(({ draw, size }) => {
          draw.withState({
            shadowBlur: 18,
            shadowColor: hsla(stampHue, 85, 65, 0.55),
          }, () => {
            draw.roundRect(rect(10, 10, size.width - 20, size.height - 20), 26, {
              fill: hsl(stampHue, 38, 18),
              stroke: hsla(stampHue, 90, 75, 0.8),
              width: 3,
            });
          });

          draw.circle(vec2(58, 72), 35, {
            fill: hsla(stampHue + 16, 85, 62, 0.88),
          });
          draw.shape(circle(vec2(104, 64), 24), {
            fill: rgba(255, 255, 255, 0.22),
            stroke: rgba(255, 255, 255, 0.55),
            width: 2,
          });
          draw.shape(line(vec2(36, 118), vec2(124, 118)), {
            stroke: hsla(stampHue + 120, 78, 66, 0.9),
            width: 7,
            lineCap: "round",
          });
          draw.withTransform({
            translate: vec2(size.center.x, size.center.y - 4),
            rotate: deg(-10),
          }, () => {
            draw.emoji("\u{2728}", vec2(0, 0), {
              size: 54,
            });
          });
        });
      };

      const renderTile = () => {
        tile.clear();
        tile.render(({ draw }) => {
          draw.clear("#18202c");
          draw.roundRect(rect(12, 12, 72, 72), 18, {
            fill: "#223047",
            stroke: "#ffffff22",
            width: 2,
          });
          draw.circle(vec2(28, 28), 12, {
            fill: Palette.Skyblue,
            alpha: 0.8,
          });
          draw.circle(vec2(68, 68), 18, {
            fill: hsla(330, 78, 64, 0.7),
          });
          draw.polyline([
            vec2(12, 70),
            vec2(34, 52),
            vec2(54, 62),
            vec2(84, 34),
          ], {
            stroke: "#ffffff99",
            width: 3,
            lineCap: "round",
            lineJoin: "round",
          });
        });
      };

      renderStamp();
      renderTile();

      const label = (draw, text, pos) => {
        draw.text(text, pos, {
          size: 14,
          fill: "#ffffff99",
          font,
        });
      };

      createCanvasApp("#canvas", (context) => {
        const { draw, time, deltaTime, size, input } = context;
        draw.clear("#0f1117");

        for (let x = 0; x <= size.width; x += 40) {
          draw.line(vec2(x, 0), vec2(x, size.height), {
            stroke: "#ffffff08",
            width: 1,
          });
        }
        for (let y = 0; y <= size.height; y += 40) {
          draw.line(vec2(0, y), vec2(size.width, y), {
            stroke: "#ffffff08",
            width: 1,
          });
        }

        draw.text("createRenderTarget()", vec2(40, 48), {
          size: 25,
          fill: Palette.White,
          font,
        });
        draw.text("別の Canvas に一度描いて、メイン Canvas へ何度も貼り付けます。", vec2(80, 82), {
          size: 15,
          fill: "#ffffff99",
          font,
        });

        if (input.mouse.left.down) {
          // クリックで RenderTarget を描き直します。clear + render の組み合わせです。
          stampHue = (stampHue + 47) % 360;
          renderStamp();

          const pos = { ...input.mouse.position };
          effects.add((t, { draw }) => {
            const progress = t / 0.7;
            if (progress >= 1) {
              return false;
            }

            const eased = easeOutCubic(progress);
            draw.circle(pos, eased * 86, {
              stroke: hsla(stampHue, 90, 72, 1 - progress),
              width: 3,
              alpha: 1 - progress,
            });
            return true;
          });
        }

        label(draw, "同じ RenderTarget を複数箇所に再描画", vec2(80, 136));
        for (let i = 0; i < 6; i += 1) {
          const x = 126 + i * 152;
          const y = 238 + Math.sin(time * 1.6 + i) * 16;
          draw.image(stamp.canvas, vec2(x, y), {
            width: stamp.width,
            height: stamp.height,
            rotation: deg(Math.sin(time + i) * 8),
            scale: 0.74 + i * 0.045,
            alpha: 0.62 + i * 0.06,
          });
        }

        draw.withState({
          shadowBlur: 26,
          shadowColor: hsla(stampHue, 80, 68, 0.35),
        }, () => {
          draw.image(stamp.canvas, vec2(956, 278), {
            width: stamp.width,
            height: stamp.height,
            rotation: deg(time * 18),
            scale: 1.55 + Math.sin(time * 1.4) * 0.05,
          });
        });
        label(draw, "大きく回転させても元の描画は 1 枚です", vec2(835, 450));

        label(draw, "別の小さな target も同時に使えます", vec2(80, 430));
        for (let i = 0; i < 9; i += 1) {
          const col = i % 3;
          const row = Math.floor(i / 3);
          draw.image(tile.canvas, vec2(128 + col * 104, 504 + row * 72), {
            width: tile.width,
            height: tile.height,
            scale: 0.7,
            mirrored: i % 2 === 1,
            alpha: 0.42 + row * 0.18,
            rotation: deg((col - 1) * 8),
          });
        }

        draw.roundRect(rect(520, 492, 560, 110), 18, {
          fill: "#161d29cc",
          stroke: "#ffffff1f",
          width: 1,
        });
        draw.text("render() は自動 clear しません。必要なら target.clear() か draw.clear() を使います。", vec2(548, 530), {
          size: 15,
          fill: "#ffffffcc",
          font,
        });
        draw.text("メイン Canvas へ描くときは { width: target.width, height: target.height } を渡すと、\ndpr 分の拡大を防げます。", vec2(548, 566), {
          size: 15,
          fill: "#ffffff99",
          font,
        });

        draw.text("クリックで左上の stamp target を描き直します。", vec2(size.center.x, 736), {
          size: 14,
          fill: "#ffffff80",
          align: "center",
          font,
        });

        effects.update(deltaTime, context);
      }, {
        autoStart: true,
        maxDpr: 2,
      });
    </script>
  </body>
</html>
