<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>wasadraw v0.7 showcase</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        overflow: auto;
        overflow-x: hidden;
        background: #0b0e16;
        color: #d9e7ff;
        font-family: system-ui, sans-serif;
      }

      #canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        touch-action: none;
        cursor: crosshair;
      }

      .spacer {
        height: 55vh;
        display: grid;
        place-items: center;
        color: rgb(217 231 255 / 0.34);
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div class="spacer">scroll to test pauseWhenOffscreen</div>

    <script type="module">
      import {
        createCanvasApp,
        createEffectManager,
        Palette,
        rgb,
        rgba,
        hsl,
        hsla,
        vec2,
        rect,
        circle,
        contains,
        // v0.5〜v0.7: グラデーション
        verticalGradient,
        horizontalGradient,
        diagonalGradient,
        radialGradient,
        linearGradient,
        // v0.5〜v0.7: 便利図形
        star,
        nStar,
        hexagon,
        plus,
        cross,
        stairs,
        astroid,
        rhombus,
        // v0.5〜v0.7: 曲線
        bezier3,
        // v0.5〜v0.7: アニメーション & イージング
        createAnimation,
        easeOutBounce,
        easeInOutExpo,
        easeOutBack,
        easeOutElastic,
        easeOutCubic,
        // geometry ヘルパ
        rotatedAt,
        getPointByAngle,
        // math ヘルパ
        pingPong,
      } from "../dist/index.js";

      const canvas = document.querySelector("#canvas");
      const font = "system-ui, sans-serif";
      const effects = createEffectManager();
      const reducedQuery = window.matchMedia("(prefers-reduced-motion: reduce)");
      let reduced = reducedQuery.matches;
      reducedQuery.addEventListener("change", (event) => {
        reduced = event.matches;
      });

      // ---- レイアウト（3 列 x 2 行のアイランド）----
      const PANEL_W = 360;
      const PANEL_H = 300;
      const GAP = 26;

      // 各アイランドの定義。hue から枠色・発光色を生成する。
      const panels = [
        { key: "gradient", title: "Gradients", hue: 280 },
        { key: "shapes", title: "Shapes", hue: 150 },
        { key: "curves", title: "Bezier / Spline", hue: 200 },
        { key: "arrows", title: "Arrow / Frame", hue: 38 },
        { key: "fancy", title: "Heart / Squircle / Balloon / Shadow", hue: 340 },
        { key: "motion", title: "Animation / Skew / Geometry", hue: 90 },
      ];

      // レイアウト矩形を毎フレーム安価に計算する（オブジェクトは 6 個だけ）。
      const layout = (size) => {
        const totalW = PANEL_W * 3 + GAP * 2;
        const totalH = PANEL_H * 2 + GAP;
        const originX = size.center.x - totalW / 2;
        const originY = size.center.y - totalH / 2 + 16;
        return panels.map((panel, i) => {
          const col = i % 3;
          const row = Math.floor(i / 3);
          const r = rect(
            originX + col * (PANEL_W + GAP),
            originY + row * (PANEL_H + GAP),
            PANEL_W,
            PANEL_H,
          );
          return { ...panel, rect: r };
        });
      };

      // ---- フレームループ外で作る頂点テンプレート（原点中心）----
      // Shapes パネル: 8 種の便利図形を原点中心で用意し、slot へ translate して描く。
      const shapeR = 30;
      const shapeTemplates = [
        { pts: star(vec2(0, 0), shapeR), fill: Palette.Gold, spin: 0.6 },
        { pts: nStar(vec2(0, 0), 7, shapeR, shapeR * 0.45), fill: Palette.Skyblue, spin: -0.5 },
        { pts: hexagon(vec2(0, 0), shapeR), fill: Palette.Seagreen, spin: 0.4 },
        { pts: rhombus(vec2(0, 0), shapeR * 1.6, shapeR * 2), fill: Palette.Violet, spin: -0.7 },
        { pts: plus(vec2(0, 0), shapeR, shapeR * 0.62), fill: Palette.Tomato, spin: 0.5 },
        { pts: cross(vec2(0, 0), shapeR, shapeR * 0.55), fill: Palette.Teal, spin: -0.4 },
        { pts: astroid(vec2(0, 0), shapeR * 1.05), fill: Palette.Salmon, spin: 0.35 },
        // stairs は左下基準なので、bbox 中心が概ね原点へ来るよう base をずらす。
        { pts: stairs(vec2(-shapeR, shapeR * 0.7), shapeR * 1.9, shapeR * 1.5, 4), fill: Palette.Crimson, spin: 0 },
      ];

      // Curves パネル: 頂点配列は一度だけ確保し、毎フレーム y を in-place 更新する。
      const waveCount = 7;
      const wavePts = Array.from({ length: waveCount }, (_, i) => vec2(-130 + (260 / (waveCount - 1)) * i, 0));
      const bezierPts = { p0: vec2(-120, 30), p1: vec2(-40, 0), p2: vec2(40, 0), p3: vec2(120, 30) };
      const bezierCurve = bezier3(bezierPts.p0, bezierPts.p1, bezierPts.p2, bezierPts.p3);
      const blobCount = 10;
      const blobPts = Array.from({ length: blobCount }, () => vec2(0, 0));
      const waveGrad = linearGradient(vec2(0, 0), vec2(1, 0), [Palette.Skyblue, Palette.Violet]);
      const blobGrad = radialGradient(hsla(200, 90, 72, 0.95), hsla(280, 80, 45, 0.35));

      // グラデーションのテンプレート（bbox 正規化なので使い回せる）。
      const gradSwatches = [
        { grad: verticalGradient(Palette.Skyblue, Palette.Violet), label: "vertical" },
        { grad: horizontalGradient(Palette.Gold, Palette.Tomato), label: "horizontal" },
        { grad: diagonalGradient(Palette.Seagreen, Palette.Skyblue), label: "diagonal" },
        { grad: radialGradient("#fff7e6", Palette.Crimson), label: "radial" },
        { grad: linearGradient(vec2(0, 0), vec2(1, 1), ["#ff5f6d", "#ffc371", "#47cf73", "#4a9fff"]), label: "linear x4" },
      ];
      // 枠のグラデーション（stroke に Gradient を渡せる）。
      const strokeGrad = linearGradient(vec2(0, 0), vec2(1, 0), [Palette.Gold, Palette.Crimson, Palette.Violet]);

      // Motion パネル: 複数トラック + 複数イージングのループアニメーション。
      const ballAnim = createAnimation(
        {
          // 跳ねる縦移動（easeOutBounce）
          y: [
            { time: 0, value: -46 },
            { time: 1.1, value: 40, ease: easeOutBounce },
            { time: 2.4, value: -46, ease: easeInOutExpo },
          ],
          // 横移動（easeInOutExpo）
          x: [
            { time: 0, value: -70 },
            { time: 1.1, value: 70, ease: easeInOutExpo },
            { time: 2.4, value: -70, ease: easeInOutExpo },
          ],
          // ポップするスケール（easeOutBack）
          pop: [
            { time: 0, value: 0.5 },
            { time: 0.5, value: 1.2, ease: easeOutBack },
            { time: 1.1, value: 1, ease: easeOutBack },
            { time: 2.4, value: 0.5, ease: easeInOutExpo },
          ],
        },
        { loop: 2.4 },
      );

      // ---- クリック時の burst エフェクト（screen space）----
      const addBurst = (pos) => {
        effects.add((t, { draw }) => {
          const progress = t / 0.8;
          if (progress >= 1) {
            return false;
          }
          const eased = easeOutCubic(progress);
          const alpha = 1 - progress;
          // withState の blend: lighter で加算合成の輝きを出す（v0.4 の添え物）。
          draw.withState({ blend: "lighter" }, () => {
            draw.circle(pos, 12 + eased * 52, {
              stroke: rgba(131, 219, 255, alpha * 0.85),
              width: 2 + alpha * 2,
            });
            for (let i = 0; i < 5; i += 1) {
              const angle = (Math.PI * 2 * i) / 5 - Math.PI / 2;
              const d = 10 + eased * (38 + i * 4);
              const p = vec2(pos.x + Math.cos(angle) * d, pos.y + Math.sin(angle) * d);
              draw.emoji("✨", p, { size: 18 - eased * 7, alpha });
            }
          });
          return true;
        });
      };

      // ---- パネルの外枠と見出し ----
      const drawPanelChrome = (draw, r, title, hue, hovered) => {
        const accent = hsl(hue, 80, 66);
        draw.withState({
          shadowBlur: hovered ? 26 : 12,
          shadowColor: hovered ? hsla(hue, 80, 60, 0.5) : rgba(20, 40, 80, 0.6),
        }, () => {
          draw.roundRect(r, 16, {
            fill: verticalGradient("#141b2c", "#0d1220"),
            stroke: hovered ? accent : rgba(120, 160, 220, 0.24),
            width: hovered ? 1.8 : 1,
          });
        });
        draw.text(title, vec2(r.x + 18, r.y + 20), {
          size: 13,
          fill: rgb(226, 238, 255),
          baseline: "top",
          font,
        });
        // 見出し下のアクセント線。
        draw.line(vec2(r.x + 18, r.y + 40), vec2(r.x + 18 + 42, r.y + 40), {
          stroke: accent,
          width: 2,
          lineCap: "round",
        });
      };

      // 各パネルの content 中心を返す。
      const contentCenter = (r) => vec2(r.x + r.w / 2, r.y + 40 + (r.h - 52) / 2);

      // ---- 各アイランドの描画 ----
      const drawGradients = (draw, r) => {
        const cx = r.x + r.w / 2;
        const cy = r.y + 60;
        // 5 種のグラデーション塗り（squircle スウォッチ）を 3 列で並べる。
        const cols = 3;
        const cellW = 96;
        const cellH = 78;
        gradSwatches.forEach((s, i) => {
          const col = i % cols;
          const row = Math.floor(i / cols);
          const p = vec2(cx + (col - 1) * cellW, cy + row * cellH + 20);
          draw.squircle(p, 26, { exponent: 4 }, { fill: s.grad });
          draw.text(s.label, vec2(p.x, p.y + 36), {
            size: 9,
            fill: rgba(210, 228, 255, 0.7),
            align: "center",
            baseline: "middle",
            font,
          });
        });
        // 6 番目のセル: グラデーションを stroke に使い、回転させる。
        const p = vec2(cx + cellW, cy + cellH + 20);
        draw.withTransform({ translate: p, rotate: reduced ? 0 : performance.now() * 0.0008 }, () => {
          draw.squircle(vec2(0, 0), 24, { exponent: 4 }, { stroke: strokeGrad, width: 5 });
        });
        draw.text("gradient stroke", vec2(p.x, p.y + 36), {
          size: 9,
          fill: rgba(210, 228, 255, 0.7),
          align: "center",
          baseline: "middle",
          font,
        });
      };

      const drawShapes = (draw, r, t) => {
        const cx = r.x + r.w / 2;
        const cy = r.y + 60;
        const cols = 4;
        const cellW = 82;
        const cellH = 108;
        shapeTemplates.forEach((s, i) => {
          const col = i % cols;
          const row = Math.floor(i / cols);
          const slot = vec2(cx + (col - 1.5) * cellW, cy + row * cellH + 34);
          // 便利図形は draw.polygon で塗る。回転は withTransform に任せ、頂点は再生成しない。
          draw.withTransform({ translate: slot, rotate: t * s.spin }, () => {
            draw.polygon(s.pts, { fill: s.fill, stroke: rgba(255, 255, 255, 0.35), width: 1 });
          });
        });
      };

      const drawCurves = (draw, r, t) => {
        const c = contentCenter(r);
        // (1) 開いた spline のウェーブ。y だけ in-place 更新。
        for (let i = 0; i < waveCount; i += 1) {
          wavePts[i].y = c.y - 62 + Math.sin(t * 1.6 + i * 0.8) * 16;
          wavePts[i].x = c.x - 130 + (260 / (waveCount - 1)) * i;
        }
        draw.spline(wavePts, { tension: 0.5 }, { stroke: waveGrad, width: 3, lineCap: "round" });
        draw.text("spline (open)", vec2(c.x, c.y - 92), {
          size: 9, fill: rgba(210, 228, 255, 0.6), align: "center", baseline: "middle", font,
        });

        // (2) 3 次ベジェ。制御点を上下に振る。
        const bob = Math.sin(t * 1.8) * 34;
        bezierPts.p0.x = c.x - 120; bezierPts.p0.y = c.y - 4;
        bezierPts.p3.x = c.x + 120; bezierPts.p3.y = c.y - 4;
        bezierPts.p1.x = c.x - 46; bezierPts.p1.y = c.y - bob;
        bezierPts.p2.x = c.x + 46; bezierPts.p2.y = c.y + bob;
        draw.bezier(bezierCurve, { stroke: Palette.Gold, width: 3, lineCap: "round" });

        // (3) 閉じた spline を塗る（blob）。半径を波打たせる。
        for (let i = 0; i < blobCount; i += 1) {
          const a = (Math.PI * 2 * i) / blobCount;
          const rr = 30 + Math.sin(t * 2 + i * 0.9) * 6;
          blobPts[i].x = c.x + Math.cos(a) * rr;
          blobPts[i].y = c.y + 66 + Math.sin(a) * rr;
        }
        draw.spline(blobPts, { closed: true, tension: 0.6 }, { fill: blobGrad, stroke: rgba(180, 220, 255, 0.5), width: 1 });
      };

      const drawArrows = (draw, r, mouse) => {
        const c = contentCenter(r);
        // frame の inner / outer 指定。内側 3px・外側 6px の二重太さ枠。
        const box = rect(c.x - 70, c.y - 66, 140, 56);
        draw.frame(box, { inner: 3, outer: 6 }, { stroke: strokeGrad });
        draw.text("frame(inner:3, outer:6)", vec2(c.x, c.y - 38), {
          size: 9, fill: rgba(210, 228, 255, 0.7), align: "center", baseline: "middle", font,
        });

        // マウスに向く矢印（インタラクション）。パネル内へ長さをクランプ。
        let dx = mouse.position.x - c.x;
        let dy = mouse.position.y - c.y + 24;
        const len = Math.hypot(dx, dy) || 1;
        const maxLen = 74;
        const s = Math.min(1, maxLen / len);
        const to = vec2(c.x + dx * s, c.y + 24 + dy * s);
        draw.arrow(vec2(c.x, c.y + 24), to, { width: 6, headSize: vec2(18, 20) }, { fill: Palette.Skyblue });

        // 両端矢印（幅を示す measure）。
        draw.doubleHeadedArrow(
          vec2(c.x - 70, c.y + 80),
          vec2(c.x + 70, c.y + 80),
          { width: 4, headSize: vec2(12, 14) },
          { fill: Palette.Gold },
        );
        draw.text("arrow → mouse / doubleHeadedArrow", vec2(c.x, c.y + 98), {
          size: 9, fill: rgba(210, 228, 255, 0.6), align: "center", baseline: "middle", font,
        });
      };

      const drawFancy = (draw, r, t, mouse) => {
        const c = contentCenter(r);
        // shadow は影だけを描くので、本体を上に重ねる（正しい使い方）。
        // camera/scale の外なので影のオフセットは崩れない。
        const cardRect = rect(c.x - 66, c.y - 74, 60, 46);
        draw.shadow(cardRect, { offset: vec2(0, 8), blur: 16, color: rgba(0, 0, 0, 0.55), radius: 14 });
        draw.roundRect(cardRect, 14, { fill: diagonalGradient(Palette.Skyblue, Palette.Violet) });

        // squircle。
        draw.squircle(vec2(c.x + 40, c.y - 50), 26, { exponent: 4 }, {
          fill: verticalGradient(Palette.Gold, Palette.Tomato),
          stroke: rgba(255, 255, 255, 0.4), width: 1,
        });

        // heart。easeOutElastic ベースの pingPong で鼓動させる（glow 添え物付き）。
        const beat = reduced ? 1 : 0.9 + easeOutElastic(pingPong(t, 1)) * 0.18;
        draw.withState({ shadowBlur: 18, shadowColor: hsla(340, 90, 60, 0.6) }, () => {
          draw.heart(vec2(c.x - 44, c.y + 34), 26 * beat, { fill: radialGradient("#ff9db4", Palette.Crimson) });
        });

        // rectBalloon はパネル内にマウスがあるときだけ尾を追随させる。
        // 画面全域を追うと尾が他パネルを横切って邪魔になるため、外では既定位置へ。
        const balloon = rect(c.x + 8, c.y + 8, 96, 52);
        const target = contains(r, mouse.position)
          ? mouse.position
          : vec2(balloon.x - 16, balloon.y + balloon.h + 28);
        draw.rectBalloon(balloon, target, {
          fill: verticalGradient("#1c2740", "#141d33"),
          stroke: rgba(150, 190, 255, 0.6), width: 1.2,
        });
        draw.text("balloon\n→ mouse", vec2(balloon.x + balloon.w / 2, balloon.y + balloon.h / 2), {
          size: 10, fill: rgba(220, 235, 255, 0.85), align: "center", baseline: "middle", lineHeight: 1.2, font,
        });
      };

      const drawMotion = (draw, r, t) => {
        const r0 = r;
        // 左側: 複数トラックのループアニメーション（emoji ボール）。
        const animCenter = vec2(r0.x + 96, contentCenter(r0).y);
        const a = ballAnim.at(t);
        // 影っぽい床。
        draw.ellipse(vec2(animCenter.x + a.x, animCenter.y + 54), 26 * a.pop, 7, { fill: rgba(0, 0, 0, 0.35) });
        draw.emoji("\u{1F3D0}", vec2(animCenter.x + a.x, animCenter.y + a.y), { size: 34 * a.pop });
        draw.text("createAnimation\nbounce / expo / back", vec2(animCenter.x, r0.y + r0.h - 28), {
          size: 9, fill: rgba(210, 228, 255, 0.6), align: "center", baseline: "middle", lineHeight: 1.2, font,
        });

        // 右上: Transform2D の skew（せん断）を揺らす。
        const skewCenter = vec2(r0.x + r0.w - 96, r0.y + 96);
        const sk = reduced ? 0 : Math.sin(t * 1.4) * 0.45;
        draw.withTransform({ translate: skewCenter, skew: vec2(sk, 0) }, () => {
          draw.roundRect(rect(-40, -26, 80, 52), 8, {
            fill: horizontalGradient(Palette.Seagreen, Palette.Skyblue),
          });
        });
        draw.text("skew", vec2(skewCenter.x, skewCenter.y + 40), {
          size: 9, fill: rgba(210, 228, 255, 0.7), align: "center", baseline: "middle", font,
        });

        // 右下: geometry の getPointByAngle（円周上の点）と rotatedAt（軸回転マーカー）。
        const gCenter = vec2(r0.x + r0.w - 96, r0.y + r0.h - 78);
        const orbit = circle(gCenter, 30);
        draw.shape(orbit, { stroke: rgba(150, 190, 255, 0.25), width: 1 });
        for (let i = 0; i < 8; i += 1) {
          const p = getPointByAngle(orbit, (Math.PI * 2 * i) / 8 + t * 0.6);
          draw.circle(p, 3, { fill: hsl(90 + i * 12, 70, 64) });
        }
        // rotatedAt: 固定点を中心周りに回す。
        const marker = rotatedAt(vec2(gCenter.x + 30, gCenter.y), gCenter, t);
        draw.line(gCenter, marker, { stroke: rgba(255, 220, 140, 0.7), width: 1.5, lineCap: "round" });
        draw.circle(marker, 4, { fill: Palette.Gold });
        draw.text("getPointByAngle / rotatedAt", vec2(gCenter.x, gCenter.y + 44), {
          size: 8, fill: rgba(210, 228, 255, 0.55), align: "center", baseline: "middle", font,
        });
      };

      // ---- 背景の星（起動時に一度だけ）----
      const mulberry32 = (seed) => () => {
        let x = (seed += 0x6d2b79f5);
        x = Math.imul(x ^ (x >>> 15), x | 1);
        x ^= x + Math.imul(x ^ (x >>> 7), x | 61);
        return ((x ^ (x >>> 14)) >>> 0) / 4294967296;
      };
      const rnd = mulberry32(70801);
      const stars = Array.from({ length: 70 }, () => ({
        x: rnd(), y: rnd(), r: rnd() * 1.2 + 0.4, tw: rnd() * Math.PI * 2,
      }));

      const drawBackground = (draw, size, t) => {
        for (const s of stars) {
          const alpha = reduced ? 0.4 : 0.22 + ((Math.sin(t * 1.5 + s.tw) + 1) / 2) * 0.5;
          draw.circle(vec2(s.x * size.width, s.y * size.height), s.r, { fill: rgba(238, 246, 255, alpha) });
        }
      };

      const drawHud = (draw, size, deltaTime, frame, mouse) => {
        const card = rect(20, 20, 264, 96);
        draw.withState({ shadowBlur: 14, shadowColor: rgba(72, 172, 255, 0.3) }, () => {
          draw.rect(card, {
            fill: rgba(12, 21, 38, 0.9),
            stroke: rgba(127, 205, 255, 0.35),
            width: 1,
          });
        });
        draw.text("WasaDraw v0.7 showcase", vec2(card.x + 16, card.y + 22), {
          size: 17, fill: rgb(233, 244, 255), baseline: "middle", font,
        });
        draw.text([
          "frame: " + frame.toString().padStart(5, "0"),
          "delta: " + (deltaTime * 1000).toFixed(1) + " ms",
          "reduced: " + (reduced ? "true" : "false"),
        ].join("\n"), vec2(card.x + 16, card.y + 50), {
          size: 11, fill: rgba(207, 225, 255, 0.78), lineHeight: 1.35, baseline: "top", font,
        });

        draw.text("各パネルにホバーで発光 / どこでもクリックで burst", vec2(size.width / 2, size.height - 30), {
          size: 12, fill: rgba(215, 234, 255, 0.5), align: "center", baseline: "middle", font,
        });
      };

      const app = createCanvasApp(canvas, (context) => {
        const { draw, time, deltaTime, frame, size, input } = context;
        const mouse = input.mouse;
        const t = reduced ? 0 : time;

        const islands = layout(size);
        const hoveredKey = (() => {
          for (const island of islands) {
            if (contains(island.rect, mouse.position)) {
              return island.key;
            }
          }
          return null;
        })();

        // クリックで burst（連打対策で down のみ）。
        if (mouse.left.down) {
          addBurst({ ...mouse.position });
        }

        draw.clear("#0b0e16");
        drawBackground(draw, size, t);

        for (const island of islands) {
          const hovered = island.key === hoveredKey;
          drawPanelChrome(draw, island.rect, island.title, island.hue, hovered);
          switch (island.key) {
            case "gradient": drawGradients(draw, island.rect); break;
            case "shapes": drawShapes(draw, island.rect, t); break;
            case "curves": drawCurves(draw, island.rect, t); break;
            case "arrows": drawArrows(draw, island.rect, mouse); break;
            case "fancy": drawFancy(draw, island.rect, t, mouse); break;
            case "motion": drawMotion(draw, island.rect, t); break;
          }
        }

        drawHud(draw, size, deltaTime, frame, mouse);
        effects.update(deltaTime, context);
      }, {
        autoStart: true,
        maxDpr: 2,
        pauseWhenHidden: true,
        pauseWhenOffscreen: true,
        respectReducedMotion: true,
      });

      window.addEventListener("pagehide", () => {
        app.destroy();
      }, { once: true });
    </script>
  </body>
</html>
