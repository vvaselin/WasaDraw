<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>canvaskit v0.4 showcase</title>
    <style>
      html,
      body {
        width: 100%;
        min-height: 100%;
        margin: 0;
      }

      body {
        overflow: auto;
        overflow-x: hidden;
        background: #0f1117;
        color: #ffffff99;
        font-family: system-ui, sans-serif;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100vh;
      }

      .spacer {
        display: grid;
        height: 54vh;
        place-items: start center;
        padding-top: 32px;
        box-sizing: border-box;
        color: #ffffff55;
        letter-spacing: 0;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div class="spacer">scroll to test pauseWhenOffscreen</div>

    <script type="module">
      import {
        createCanvasApp,
        createEffectManager,
        createRenderTarget,
        createCamera2D,
        Palette,
        Color,
        rgb,
        rgba,
        hsl,
        hsla,
        vec2,
        rect,
        circle,
        line,
        moved,
        centerOf,
        contains,
        deg,
        easeOutCubic,
        pingPong,
      } from "../dist/index.js";

      const canvas = document.querySelector("#canvas");
      if (!(canvas instanceof HTMLCanvasElement)) {
        throw new Error("showcase: #canvas must be a canvas element.");
      }

      const font = "system-ui, sans-serif";
      const effects = createEffectManager();
      const camera = createCamera2D({
        center: vec2(80, -80),
        zoom: 0.74,
      });
      let latestSize = null;

      const reducedQuery = window.matchMedia("(prefers-reduced-motion: reduce)");
      let reduced = reducedQuery.matches;
      reducedQuery.addEventListener("change", (event) => {
        reduced = event.matches;
      });

      const badge = createRenderTarget(148, 148, { maxDpr: 2 });
      badge.render(({ draw, size }) => {
        draw.clear();
        draw.withState({
          shadowBlur: 18,
          shadowColor: rgba(122, 162, 255, 0.65),
        }, () => {
          draw.circle(size.center, 54, {
            fill: Color.rgb(122, 162, 255).withAlpha(0.24).toString(),
            stroke: Palette.Skyblue,
            width: 4,
          });
        });
        draw.emoji("\u{2728}", size.center, {
          size: 46,
        });
        draw.text("RT", vec2(size.center.x, 112), {
          size: 15,
          fill: Palette.White,
          align: "center",
          baseline: "middle",
          font,
        });
      });

      canvas.addEventListener("wheel", (event) => {
        event.preventDefault();

        if (latestSize === null) {
          return;
        }

        const bounds = canvas.getBoundingClientRect();
        const mouse = vec2(event.clientX - bounds.left, event.clientY - bounds.top);
        camera.zoomAt(mouse, event.deltaY < 0 ? 1.1 : 0.9, latestSize);
      }, { passive: false });

      const drawWorldGrid = (draw) => {
        for (let x = -720; x <= 720; x += 80) {
          draw.line(vec2(x, -520), vec2(x, 520), {
            stroke: x === 0 ? rgba(255, 255, 255, 0.2) : rgba(255, 255, 255, 0.055),
            width: x === 0 ? 2 : 1,
          });
        }

        for (let y = -520; y <= 520; y += 80) {
          draw.line(vec2(-720, y), vec2(720, y), {
            stroke: y === 0 ? rgba(255, 255, 255, 0.2) : rgba(255, 255, 255, 0.055),
            width: y === 0 ? 2 : 1,
          });
        }
      };

      const drawHud = (draw, size, frame, deltaTime, mouse, worldMouse) => {
        draw.roundRect(rect(18, 18, 330, 146), 12, {
          fill: rgba(15, 17, 23, 0.72),
          stroke: rgba(255, 255, 255, 0.16),
          width: 1,
        });

        draw.text("CanvasKit v0.4 showcase", vec2(36, 42), {
          size: 20,
          fill: Palette.White,
          font,
        });

        draw.text(
          `frame: ${frame}\ndelta: ${(deltaTime * 1000).toFixed(1)} ms\nmouse: ${mouse.position.x.toFixed(0)}, ${mouse.position.y.toFixed(0)}\nworld: ${worldMouse.x.toFixed(1)}, ${worldMouse.y.toFixed(1)}\nzoom: ${camera.zoom.toFixed(2)}\nreduced: ${reduced}`,
          vec2(36, 68),
          {
            size: 12,
            lineHeight: 1.18,
            fill: "#ffffffaa",
            font,
          },
        );

        draw.text("drag background: pan / wheel: zoom", vec2(size.width - 28, 32), {
          size: 13,
          fill: "#ffffff80",
          align: "right",
          font,
        });
      };

      const app = createCanvasApp("#canvas", (context) => {
        const { draw, time, deltaTime, frame, size, input } = context;
        const mouse = input.mouse;
        latestSize = size;

        const card = rect(size.width / 2 - 250, size.height / 2 - 112, 500, 194);
        const hovered = contains(card, mouse.position);

        if (mouse.left.pressed && !hovered) {
          camera.moveBy(vec2(
            -mouse.delta.x / camera.zoom,
            -mouse.delta.y / camera.zoom,
          ));
        }

        const motionTime = reduced ? 0 : time;
        const worldMouse = camera.screenToWorld(mouse.position, size);
        const hoverMix = reduced ? 0.5 : pingPong(time, 1);

        if (mouse.left.down && hovered && !reduced) {
          const pos = { ...mouse.position };

          effects.add((age, { draw }) => {
            const progress = age / 0.9;
            if (progress >= 1) {
              return false;
            }

            const eased = easeOutCubic(progress);
            draw.circle(pos, 10 + eased * 48, {
              stroke: Color.rgb(255, 255, 255).withAlpha(1 - progress).toString(),
              width: 3,
            });

            return true;
          });
        }

        draw.clear("#0f1117");

        draw.withCamera(camera, size, () => {
          drawWorldGrid(draw);
          draw.shape(circle(vec2(430, -240), 42), {
            fill: Color.rgb(122, 162, 255).withAlpha(0.14).toString(),
            stroke: Palette.Skyblue,
            width: 2,
          });
          draw.shape(line(vec2(270, -330), vec2(560, -178)), {
            stroke: hsla(210, 80, 70, 0.24),
            width: 2,
            dash: [10, 8],
          });
          draw.circle(worldMouse, 8, {
            fill: Palette.Orange,
            alpha: 0.9,
          });
        });

        effects.update(deltaTime, context);

        const baseColor = Color.rgb(35, 47, 68);
        const hotColor = Color.rgb(80, 160, 255);
        const cardColor = Color.lerp(baseColor, hotColor, hovered ? 0.42 + hoverMix * 0.18 : 0.12);
        const cardCenter = centerOf(card);

        draw.withState({
          shadowBlur: hovered ? 26 : 12,
          shadowColor: cardColor.withAlpha(0.58).toString(),
        }, () => {
          draw.roundRect(card, 18, {
            fill: cardColor.withAlpha(0.92).toString(),
            stroke: hovered ? Palette.White : cardColor.toString(),
            width: hovered ? 3 : 2,
          });
        });

        draw.text("geometry value\n+ Color.lerp()\n+ multiline text", vec2(card.x + 28, card.y + 34), {
          size: 24,
          lineHeight: 1.16,
          fill: Palette.White,
          font,
        });

        draw.rect(rect(card.x + 28, card.y + 142, 90, 22), {
          fill: rgb(80, 160, 255),
          alpha: 0.58,
        });
        draw.roundRect(rect(card.x + 132, card.y + 136, 112, 34), 10, {
          fill: hsl((motionTime * 80) % 360, 74, 58),
          stroke: hsla((motionTime * 80 + 180) % 360, 82, 72, 0.7),
          width: 2,
        });
        draw.circle(vec2(card.x + 296, card.y + 153), 18, {
          fill: rgba(255, 255, 255, 0.22),
          stroke: Palette.White,
          width: 1,
        });

        const sourceCircle = circle(vec2(card.x + 344, card.y + 152), 16);
        const shiftedCircle = moved(sourceCircle, vec2(34, 0));
        draw.shape(sourceCircle, {
          fill: Color.rgb(80, 250, 123).withAlpha(0.42).toString(),
          stroke: Palette.Seagreen,
          width: 2,
        });
        draw.shape(shiftedCircle, {
          stroke: Palette.Seagreen,
          width: 2,
          dash: [5, 5],
        });

        draw.text("card hover: contains(rect, mouse)", vec2(card.x + card.w - 28, card.y + 38), {
          size: 13,
          fill: "#ffffff99",
          align: "right",
          font,
        });

        const left = size.width * 0.22;
        const lower = size.height * 0.74;
        draw.text("shape helpers", vec2(left, lower - 118), {
          size: 16,
          fill: "#ffffffcc",
          align: "center",
          font,
        });
        draw.polygon([
          vec2(left - 106, lower - 18),
          vec2(left - 64, lower - 76),
          vec2(left + 2, lower - 52),
          vec2(left + 18, lower + 16),
          vec2(left - 84, lower + 28),
        ], {
          fill: Color.rgb(255, 184, 108).withAlpha(0.24).toString(),
          stroke: Palette.Orange,
          width: 2,
        });
        draw.polyline([
          vec2(left + 42, lower + 22),
          vec2(left + 82, lower - 28),
          vec2(left + 126, lower + 8),
          vec2(left + 168, lower - 62),
          vec2(left + 208, lower - 14),
        ], {
          stroke: hsl((motionTime * 70) % 360, 78, 66),
          width: 4,
          lineCap: "round",
          lineJoin: "round",
        });
        draw.arc(vec2(left + 214, lower + 30), 44, deg(-160), deg(40 + Math.sin(motionTime * 2) * 70), {
          stroke: Palette.Hotpink,
          width: 6,
          lineCap: "round",
        });

        const right = size.width * 0.78;
        const spin = reduced ? 0 : motionTime * 0.8;
        draw.text("transform / state / image", vec2(right, lower - 118), {
          size: 16,
          fill: "#ffffffcc",
          align: "center",
          font,
        });
        draw.withTransform({
          translate: vec2(right - 86, lower - 18),
          rotate: spin,
          scale: 1 + Math.sin(motionTime * 2) * 0.08,
        }, () => {
          draw.withState({
            alpha: 0.9,
            blend: "lighter",
            shadowBlur: 16,
            shadowColor: "#7aa2ff",
            lineCap: "round",
            lineJoin: "round",
          }, () => {
            draw.line(vec2(-58, 0), vec2(58, 0), {
              stroke: rgba(122, 162, 255, 0.82),
              width: 6,
            });
            draw.circle(vec2(0, 0), 34, {
              stroke: Palette.White,
              width: 2,
            });
            draw.emoji("\u{1F680}", vec2(62, 0), {
              size: 34,
            });
          });
        });

        draw.image(badge.canvas, vec2(right + 74, lower - 28), {
          width: badge.width,
          height: badge.height,
          scale: 0.72,
          rotation: spin * 0.35,
          alpha: 0.94,
        });
        draw.image(badge.canvas, vec2(right + 158, lower + 52), {
          width: badge.width,
          height: badge.height,
          scale: 0.42,
          mirrored: true,
          alpha: 0.48,
        });

        drawHud(draw, size, frame, deltaTime, mouse, worldMouse);
      }, {
        autoStart: true,
        maxDpr: 2,
        pauseWhenHidden: true,
        pauseWhenOffscreen: true,
        respectReducedMotion: true,
      });

      window.addEventListener("pagehide", () => {
        app.destroy();
        badge.destroy();
      }, { once: true });
    </script>
  </body>
</html>
